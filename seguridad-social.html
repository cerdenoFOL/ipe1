<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seguridad Social — IPE I · 2026</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<style>
:root {
  --cream: #f5f0e8;
  --white: #fdfcf9;
  --terracotta: #c0533a; --terracotta-light: #e8d5cf; --terracotta-dark: #8f3726;
  --slate: #2d3f50;
  --gold: #c8973a; --gold-light: #f0e4c8; --gold-dark: #a97a20;
  --green: #3a7d5a; --green-light: #d0eadb;
  --text: #1e2a35; --muted: #7a8b96; --border: #ddd5c8;
  --radius: 12px;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Lato', sans-serif;
  background: var(--cream); color: var(--text); min-height: 100vh;
}
body::before {
  content: ''; position: fixed; inset: 0;
  background-image: repeating-linear-gradient(0deg, transparent, transparent 24px, rgba(0,0,0,0.018) 24px, rgba(0,0,0,0.018) 25px);
  pointer-events: none; z-index: 0;
}

/* ── NAV ── */
nav {
  position: relative; z-index: 10;
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 16px 40px; display: flex; align-items: center; justify-content: space-between;
}
.nav-brand {
  font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
  color: var(--slate); display: flex; align-items: center; gap: 10px;
}
.nav-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--gold); }
.nav-tag {
  font-size: 12px; color: var(--muted); border: 1px solid var(--border);
  padding: 4px 14px; border-radius: 100px; background: var(--cream);
}

/* ── TABS (sticky, just below nav) ── */
.tabs-bar {
  position: sticky; top: 0; z-index: 20;
  background: var(--white); border-bottom: 1px solid var(--border);
  padding: 0 40px; display: flex; gap: 0;
  box-shadow: 0 2px 8px rgba(0,0,0,0.04);
}
.tab-btn {
  font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700;
  padding: 15px 22px; border: none; background: transparent; cursor: pointer;
  color: var(--muted); border-bottom: 2px solid transparent; margin-bottom: -1px;
  transition: color .15s, border-color .15s; display: flex; align-items: center; gap: 7px;
}
.tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
.tab-btn:hover:not(.active) { color: var(--text); }

/* ── MAIN ── */
main {
  position: relative; z-index: 1;
  max-width: 880px; margin: 0 auto; padding: 48px 40px 100px;
  animation: fadeUp .4s ease both;
}

/* eyebrow */
.eyebrow {
  font-size: 11px; font-weight: 700; letter-spacing: .12em; text-transform: uppercase;
  color: var(--terracotta); display: flex; align-items: center; gap: 12px; margin-bottom: 28px;
}
.eyebrow::after { content: ''; flex: 1; height: 1px; background: var(--border); }

/* section title (inside main, replaces hero) */
.section-header { margin-bottom: 32px; }
.section-header h2 {
  font-family: 'Playfair Display', serif;
  font-size: clamp(28px, 4vw, 40px); font-weight: 800; line-height: 1.1;
  color: var(--slate); margin-bottom: 8px;
}
.section-header h2 em { font-style: italic; color: var(--gold); }
.section-header p { font-size: 15px; color: var(--muted); font-weight: 300; line-height: 1.7; max-width: 520px; }

/* pills */
.pills { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 28px; }
.pill {
  font-family: 'Lato', sans-serif; font-size: 13px; font-weight: 700;
  padding: 7px 16px; border-radius: 100px;
  border: 1px solid var(--border); background: var(--white);
  color: var(--muted); cursor: pointer; transition: all .15s; white-space: nowrap;
}
.pill.active { background: var(--gold); border-color: var(--gold); color: #fff; }
.pill:hover:not(.active) { border-color: var(--slate); color: var(--text); }

/* theory card */
.theory-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
  animation: fadeUp .3s ease both;
}
.theory-card-head {
  display: flex; align-items: center; gap: 16px;
  padding: 24px 28px; border-bottom: 1px solid var(--border);
  background: var(--slate);           /* slate head — contrasts cleanly */
}
.theory-icon { font-size: 28px; }
.theory-card-head h2 {
  font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 800;
  color: var(--white); line-height: 1.15;
}
.theory-card-head .unit-tag {
  font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
  color: rgba(255,255,255,.45); margin-top: 4px;
}
.theory-body { padding: 28px 32px; background: var(--white); }

/* content blocks */
.block-text { font-size: 15px; line-height: 1.85; color: var(--text); margin: 8px 0; }
.block-sub {
  font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
  color: var(--slate); margin: 26px 0 10px; padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.block-tip {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--green-light); border: 1px solid #a8d5be;
  border-radius: 8px; padding: 13px 16px; margin: 14px 0;
  font-size: 14px; line-height: 1.7; color: #1e4a32;
}
.block-formula {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--gold-light); border: 1px solid #e0c87a;
  border-radius: 8px; padding: 13px 16px; margin: 12px 0;
  font-size: 13.5px; color: #5c3d0a; line-height: 1.7; font-weight: 700;
}
.block-icon { font-size: 15px; flex-shrink: 0; margin-top: 1px; }

/* tables */
.tbl-wrap {
  overflow-x: auto; margin: 16px 0;
  border-radius: 8px; border: 1px solid var(--border);
  background: var(--white);
}
table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
thead th {
  padding: 11px 18px; text-align: left; font-size: 11px; font-weight: 700;
  letter-spacing: .6px; text-transform: uppercase; color: var(--white);
  border-bottom: 1px solid rgba(255,255,255,.15); background: var(--slate);
}
tbody td { padding: 12px 18px; border-bottom: 1px solid var(--border); line-height: 1.55; color: var(--text); }
tbody tr:last-child td { border-bottom: none; }
tbody tr:nth-child(even) td { background: var(--cream); }

/* ── CALC ── */
.calc-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden; margin-bottom: 24px;
  box-shadow: 0 4px 16px rgba(45,63,80,0.07), 0 1px 3px rgba(45,63,80,0.05);
}
.calc-head {
  padding: 22px 26px; display: flex; align-items: center; gap: 14px;
  background: var(--gold-light);
  border-bottom: 1px solid #e0c87a;
}
.calc-icon { font-size: 26px; flex-shrink: 0; line-height: 1; }
.calc-head-title {
  font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 700;
  color: var(--slate); line-height: 1.2;
}
.calc-head-desc { font-size: 13px; color: #7a5a18; margin-top: 3px; font-weight: 400; line-height: 1.5; }
.calc-badge {
  font-size: 11px; font-weight: 700; padding: 4px 12px; border-radius: 100px;
  background: rgba(255,255,255,.65); color: #7a5a18; border: 1px solid #e0c87a;
  flex-shrink: 0; margin-left: auto; white-space: nowrap;
}
.calc-inputs {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(185px, 1fr));
  gap: 16px; padding: 22px 26px;
}
.calc-label {
  font-size: 11px; font-weight: 700; letter-spacing: .3px; text-transform: uppercase;
  color: var(--muted); display: block; margin-bottom: 7px;
}
.calc-input {
  width: 100%; padding: 11px 14px; border-radius: 8px;
  border: 1.5px solid var(--border); background: var(--cream);
  color: var(--text); font-size: 16px; font-family: 'Lato', sans-serif; font-weight: 700;
  outline: none; transition: border-color .15s, background .15s;
}
.calc-input:focus { border-color: var(--gold); background: var(--white); }
.calc-btn-wrap { padding: 0 26px 22px; }
.calc-btn {
  font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; letter-spacing: .02em;
  padding: 13px 0; width: 100%; border: none; border-radius: 8px;
  background: var(--gold); color: #fff; cursor: pointer; transition: background .15s;
}
.calc-btn:hover { background: var(--gold-dark); }
.calc-results {
  padding: 0 26px 24px; background: var(--white);
  border-top: 1px solid var(--border);
  padding-top: 20px; display: flex; flex-direction: column; gap: 8px;
}
.step {
  padding: 12px 16px; border-radius: 8px;
  background: var(--cream); border: 1px solid var(--border);
  border-left: 3px solid #d5c9b8;
  animation: fadeUp .25s ease both;
}
.step.hl {
  background: var(--gold-light); border-color: #e0c87a;
  border-left: 3px solid var(--gold);
}
.step-label { font-size: 10.5px; font-weight: 700; text-transform: uppercase; letter-spacing: .5px; color: var(--muted); margin-bottom: 5px; }
.step.hl .step-label { color: var(--gold-dark); }
.step-val { font-size: 14px; font-weight: 700; color: var(--text); line-height: 1.6; }
.step-note { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* ── QUIZ ── */
.quiz-wrap {
  background: var(--white); border: 1px solid var(--border);
  border-radius: var(--radius); overflow: hidden;
}
.quiz-inner { padding: 28px 32px; }
.quiz-meta { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
.quiz-counter { font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase; color: var(--muted); }
.quiz-score { font-size: 11px; font-weight: 700; color: var(--gold-dark); background: var(--gold-light); border: 1px solid #e0c87a; padding: 3px 12px; border-radius: 100px; }
.quiz-progress { height: 3px; background: var(--terracotta-light); border-radius: 99px; margin-bottom: 24px; overflow: hidden; }
.quiz-progress-fill { height: 100%; background: var(--terracotta); border-radius: 99px; transition: width .4s cubic-bezier(.4,0,.2,1); }
.quiz-q { font-family: 'Playfair Display', serif; font-size: 19px; font-weight: 700; line-height: 1.5; margin-bottom: 20px; color: var(--slate); }
.quiz-options { display: flex; flex-direction: column; gap: 9px; }
.quiz-opt {
  display: flex; align-items: center; gap: 12px; padding: 13px 16px;
  border-radius: 8px; border: 1.5px solid var(--border); background: var(--cream);
  font-family: 'Lato', sans-serif; font-size: 14px; color: var(--text);
  cursor: pointer; text-align: left; width: 100%; transition: all .15s; line-height: 1.5;
}
.quiz-opt:hover:not(:disabled) { border-color: var(--slate); background: var(--white); }
.quiz-opt.correct { background: var(--green-light); border-color: var(--green); color: #1e4a32; }
.quiz-opt.wrong { background: var(--terracotta-light); border-color: var(--terracotta); color: var(--terracotta-dark); }
.quiz-letter {
  width: 27px; height: 27px; border-radius: 6px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  font-size: 12px; font-weight: 700;
  background: var(--white); border: 1px solid var(--border); color: var(--muted);
  transition: all .15s;
}
.quiz-opt.correct .quiz-letter { background: var(--green); border-color: var(--green); color: #fff; }
.quiz-opt.wrong   .quiz-letter { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
.quiz-next {
  display: block; width: 100%; padding: 13px; border: none; border-radius: 8px;
  background: var(--terracotta); color: #fff; font-family: 'Lato', sans-serif;
  font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; margin-top: 16px;
}
.quiz-next:hover { background: var(--terracotta-dark); }
.quiz-end { text-align: center; padding: 40px 16px; animation: scaleIn .4s ease both; }
.quiz-end-emoji { font-size: 56px; margin-bottom: 8px; }
.quiz-end-pct { font-family: 'Playfair Display', serif; font-size: 72px; font-weight: 800; line-height: 1; }
.quiz-end-label { font-size: 15px; color: var(--muted); margin-top: 8px; }
.quiz-end-msg { font-size: 14px; color: var(--muted); margin: 16px auto 28px; max-width: 280px; line-height: 1.65; font-weight: 300; }
.quiz-restart { display: inline-block; padding: 12px 32px; border: none; border-radius: 8px; background: var(--terracotta); color: #fff; font-family: 'Lato', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; transition: background .15s; }
.quiz-restart:hover { background: var(--terracotta-dark); }

/* ── FOOTER ── */
footer {
  position: relative; z-index: 1; background: var(--white);
  border-top: 1px solid var(--border); padding: 20px 40px;
  display: flex; align-items: center; justify-content: space-between;
  flex-wrap: wrap; gap: 12px; font-size: 13px; color: var(--muted);
}
footer strong { color: var(--text); }

@media(max-width: 600px) {
  nav, main, footer { padding-left: 20px; padding-right: 20px; }
  .tabs-bar { padding: 0 16px; }
  .theory-body, .calc-inputs, .calc-btn-wrap { padding-left: 16px; padding-right: 16px; }
}
@keyframes fadeUp  { from { opacity:0; transform:translateY(10px) } to { opacity:1; transform:translateY(0) } }
@keyframes scaleIn { from { opacity:0; transform:scale(.96) } to { opacity:1; transform:scale(1) } }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState} = React;

const THEORY=[
  {id:"bases",title:"Bases y Base Reguladora",icon:"📊",content:[
    {t:"sub",v:"¿Qué es la Base de Cotización (BC)?"},
    {t:"text",v:"Es la cantidad sobre la que se aplican los porcentajes de cotización para calcular lo que paga la empresa y el trabajador a la Seguridad Social cada mes. Se calcula a partir de la retribución mensual bruta del trabajador, incluyendo salario base, complementos salariales, pagas extra prorrateadas y, en su caso, horas extraordinarias."},
    {t:"formula",v:"BC mensual = Salario base + Complementos + Prorrata pagas extra"},
    {t:"tip",v:"La BC tiene topes: una base mínima y una base máxima que fija el Gobierno cada año. En 2026, la base máxima del Régimen General es de 4.720,50 €/mes."},
    {t:"sub",v:"Tipos de Base de Cotización"},
    {t:"table",h:["Tipo","¿Qué incluye?","¿Para qué se usa?"],r:[
      ["BCCC (Conting. Comunes)","Salario base + complementos + prorrata pagas extra (SIN horas extra)","Cotizaciones por CC, y la BR de IT por enf. común, nacimiento, jubilación…"],
      ["BCCP (Conting. Profesionales)","Todo lo anterior + horas extraordinarias","Cotizaciones por AT/EP, desempleo, FOGASA, FP, y la BR de IT por AT/EP y desempleo"],
    ]},
    {t:"tip",v:"Diferencia clave: las horas extraordinarias NO se incluyen en la BCCC pero SÍ en la BCCP."},
    {t:"sub",v:"Ejemplo numérico"},
    {t:"text",v:"Pablo, técnico de imagen diagnóstica: salario base 1.200 €, complemento turnicidad 200 €, prorrata pagas 233,33 €, horas extra 150 €."},
    {t:"formula",v:"BCCC = 1.200 + 200 + 233,33 = 1.633,33 € (sin horas extra)"},
    {t:"formula",v:"BCCP = 1.200 + 200 + 233,33 + 150 = 1.783,33 € (con horas extra)"},
    {t:"tip",v:"¿Por qué las horas extra van aparte? Porque son irregulares. Para contingencias comunes se busca una base estable. Para profesionales se incluye todo, porque un AT puede ocurrir precisamente haciendo horas extra."},
    {t:"sub",v:"¿Qué es la Base Reguladora (BR)?"},
    {t:"text",v:"Es la cantidad sobre la que se calcula la cuantía de una prestación (baja, desempleo, jubilación…). Se obtiene a partir de las BC, pero la fórmula varía según la prestación."},
    {t:"table",h:["Concepto","Base de Cotización","Base Reguladora"],r:[
      ["¿Qué es?","Cantidad sobre la que se cotiza cada mes","Cantidad sobre la que se calcula la prestación"],
      ["¿Cuándo se usa?","Cada mes, para calcular cotizaciones","Cuando nace el derecho a una prestación"],
      ["¿Quién la determina?","Se deriva del salario bruto","Se calcula con fórmulas específicas por prestación"],
      ["Ejemplo","Técnico cobra 1.800 € → BCCC = 1.800 €","Gripe → BR diaria = 1.800 ÷ 30 = 60 €/día"],
    ]},
    {t:"sub",v:"Fórmulas de BR por prestación"},
    {t:"table",h:["Prestación","Fórmula","Base"],r:[
      ["IT (enf. común)","BCCC mes anterior ÷ 30","BCCC"],
      ["IT (AT/EP)","(BCCP mes anterior ÷ 30) + (H. extra año ÷ 365)","BCCP"],
      ["Nacimiento","BCCC mes anterior ÷ 30","BCCC"],
      ["Desempleo","Suma BCCP últimos 180 días ÷ 180","BCCP"],
      ["Jubilación","Media BCCC últimos 25 años (÷ 350)","BCCC"],
    ]},
    {t:"tip",v:"Truco: la BC es lo que PAGAS (cotizaciones), la BR es lo que COBRAS (prestaciones). La BC alimenta la BR."},
  ]},
  {id:"regimenes",title:"Regímenes",icon:"🏛️",content:[
    {t:"text",v:"El sistema se articula en dos grandes bloques:"},
    {t:"table",h:["Régimen","¿A quién incluye?","Ejemplos"],r:[
      ["Régimen General","Trabajadores por cuenta ajena","Técnico de radioterapia en hospital, administrativos…"],
      ["Regímenes Especiales","Actividades con características especiales","Autónomos (RETA), Trabajadores del Mar, Minería del Carbón…"],
    ]},
    {t:"tip",v:"Como técnico/a sanitario/a en un hospital estarás en el Régimen General. Si abres tu propia clínica, en el RETA (autónomos)."},
  ]},
  {id:"entidades",title:"Entidades Gestoras",icon:"🏢",content:[
    {t:"table",h:["Entidad","Función principal"],r:[
      ["INSS","Prestaciones económicas contributivas: IT, jubilación, viudedad, orfandad, nacimiento…"],
      ["INGESA","Servicios sanitarios en Ceuta y Melilla"],
      ["IMSERSO","Prestaciones para mayores y personas con discapacidad"],
      ["ISM","Prestaciones de trabajadores del mar"],
      ["SEPE","Desempleo, formación e intermediación laboral"],
      ["INSST","Asesoramiento en prevención de riesgos laborales"],
    ]},
    {t:"tip",v:"Las Mutuas Colaboradoras gestionan AT/EP e IT. Cada empresa elige su Mutua al inscribirse."},
  ]},
  {id:"obligaciones",title:"Obligaciones Empresa",icon:"📋",content:[
    {t:"sub",v:"1. Inscripción"},
    {t:"text",v:"La empresa solicita inscripción ante la TGSS y recibe un CCC (Código de Cuenta de Cotización) de 11 cifras. Necesita un CCC por cada provincia donde tenga centro de trabajo."},
    {t:"sub",v:"2. Afiliación, Alta y Baja"},
    {t:"table",h:["Acto","Descripción","Plazo"],r:[
      ["Afiliación","Una sola vez en la vida. Se asigna NAF.","Antes de la 1ª relación laboral"],
      ["Alta","Cada nueva relación laboral","Antes de comenzar (hasta 60 días antes)"],
      ["Baja","Al finalizar la relación laboral","3 días naturales"],
    ]},
    {t:"tip",v:"Si el empresario no da el alta → «alta presunta»: el trabajador mantiene derechos pero el empresario responde directamente."},
    {t:"sub",v:"3. Cotización — Régimen General 2026"},
    {t:"table",h:["Concepto","Empresa","Trabajador","Total"],r:[
      ["Contingencias comunes","23,60 %","4,70 %","28,30 %"],
      ["Desempleo (indefinido)","5,50 %","1,55 %","7,05 %"],
      ["Desempleo (temporal)","6,70 %","1,60 %","8,30 %"],
      ["FOGASA","0,20 %","—","0,20 %"],
      ["Formación profesional","0,60 %","0,10 %","0,70 %"],
      ["MEI","0,75 %","0,15 %","0,90 %"],
    ]},
    {t:"tip",v:"La empresa paga aprox. 30–32 % y el trabajador 6,35–6,45 %. La empresa paga unas 5 veces más."},
  ]},
  {id:"autonomos",title:"Autónomos",icon:"💼",content:[
    {t:"text",v:"Los autónomos (RETA) cotizan según rendimientos netos reales."},
    {t:"table",h:["Concepto","Tipo","Cobertura"],r:[
      ["Contingencias comunes","28,30 %","Jubilación, IT, IP, muerte y supervivencia"],
      ["Contingencias profesionales","1,30 %","AT y EP"],
      ["Cese de actividad","0,90 %","Equivalente a desempleo"],
      ["Formación profesional","0,10 %","Formación continua"],
      ["MEI","0,90 %","Sostenibilidad pensiones"],
    ]},
    {t:"sub",v:"Tarifa plana 2026"},
    {t:"text",v:"80 €/mes (≈ 88,64 € con MEI) durante 12 meses. Prorrogable 12 meses más si rendimientos < SMI. Jóvenes (mujeres < 35, hombres < 30): bonificación 30 % adicional. Municipios rurales (< 5.000 hab.): hasta 36 meses."},
  ]},
  {id:"it",title:"Incapacidad Temporal",icon:"🩺",content:[
    {t:"text",v:"Situación en la que un trabajador temporalmente no puede trabajar y necesita asistencia sanitaria."},
    {t:"sub",v:"Requisitos"},
    {t:"text",v:"Afiliado y en alta. Enfermedad común: 180 días cotizados en los últimos 5 años. AT, EP o accidente no laboral: no se exige período previo."},
    {t:"sub",v:"Duración: máx. 12 meses + 6 de prórroga"},
    {t:"sub",v:"Enfermedad común / Acc. no laboral"},
    {t:"table",h:["Días","% de la BR","¿Quién paga?"],r:[
      ["Días 1-3","0 % (no se cobra)","Nadie"],
      ["Días 4-15","60 %","Empresario"],
      ["Días 16-20","60 %","INSS / Mutua"],
      ["Día 21 en adelante","75 %","INSS / Mutua"],

function Quiz(){
  const [qs]=useState(()=>QUIZ.slice().sort(()=>Math.random()-.5));
  const [cur,setCur]=useState(0);
  const [sel,setSel]=useState(null);
  const [show,setShow]=useState(false);
  const [score,setScore]=useState(0);
  const pick=i=>{if(show)return;setSel(i);setShow(true);if(i===qs[cur].c)setScore(s=>s+1);};
  const next=()=>{setSel(null);setShow(false);setCur(c=>c+1);};
  const restart=()=>{setCur(0);setSel(null);setShow(false);setScore(0);};
  if(cur>=qs.length){
    const pct=Math.round(score/qs.length*100);
    const clr=pct>=70?"var(--green)":pct>=50?"var(--gold)":"var(--terracotta)";
    return React.createElement("div",{className:"quiz-end"},
      React.createElement("div",{className:"quiz-end-emoji"},pct>=70?"🎉":pct>=50?"💪":"📚"),
      React.createElement("div",{className:"quiz-end-pct",style:{color:clr}},pct+"%"),
      React.createElement("div",{className:"quiz-end-label"},`${score} de ${qs.length} correctas`),
      React.createElement("p",{className:"quiz-end-msg"},pct>=70?"¡Excelente! Dominas el tema.":pct>=50?"Buen intento. Repasa los que fallaste.":"Necesitas repasar. ¡Ánimo!"),
      React.createElement("button",{className:"quiz-restart",onClick:restart},"Repetir test"));
  }
  const q=qs[cur];
  return React.createElement("div",null,
    React.createElement("div",{className:"quiz-meta"},
      React.createElement("span",{className:"quiz-counter"},`Pregunta ${cur+1} / ${qs.length}`),
      React.createElement("span",{className:"quiz-score"},`${score} correctas`)),
    React.createElement("div",{className:"quiz-progress"},
      React.createElement("div",{className:"quiz-progress-fill",style:{width:`${cur/qs.length*100}%`}})),
    React.createElement("p",{className:"quiz-q"},q.q),
    React.createElement("div",{className:"quiz-options"},
      q.o.map((opt,i)=>{
        const cls=show?(i===q.c?"quiz-opt correct":i===sel?"quiz-opt wrong":"quiz-opt"):"quiz-opt";
        return React.createElement("button",{key:i,className:cls,onClick:()=>pick(i),disabled:show},
          React.createElement("span",{className:"quiz-letter"},show&&i===q.c?"✓":show&&i===sel?"✗":["A","B","C","D"][i]),opt);})),
    show&&React.createElement("button",{className:"quiz-next",onClick:next},cur+1<qs.length?"Siguiente →":"Ver resultado"));
}
